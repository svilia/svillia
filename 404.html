<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - 404</title>
    <style>
        body {
            background-color: #0f111a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .error-box {
            background: #1a1c28;
            padding: 3rem;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { font-size: 6rem; margin: 0; color: #6c5ce7; }
        p { font-size: 1.2rem; color: #a0a5c1; margin: 1rem 0 2rem 0; }
        .btn {
            background: #6c5ce7; color: white; padding: 0.8rem 1.5rem;
            text-decoration: none; border-radius: 4px; font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover { background: #5b4cc4; }
    </style>
</head>
<body>
    <div class="error-box">
        <h1>404</h1>
        <p>Looks like you spawned into the wrong map. This page doesn't exist.</p>
        <a href="games.html" class="btn">Return to Safe Zone (Games)</a>
    </div>
</body>
</html>
