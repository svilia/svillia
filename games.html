<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games - Svilia Games</title>
    <style>
        :root {
            --bg-color: #0f111a;
            --text-color: #ffffff;
            --accent-color: #6c5ce7;
            --secondary-bg: #1a1c28;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        nav {
            background-color: var(--secondary-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
        }
        nav .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent-color); }
        nav ul { list-style: none; display: flex; gap: 1.5rem; margin: 0; padding: 0; }
        nav a { color: var(--text-color); text-decoration: none; font-weight: 500; }
        nav a:hover, nav a.active { color: var(--accent-color); }
        
        .main-content { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .search-bar { margin-bottom: 2rem; width: 100%; max-width: 400px; }
        .search-bar input {
            width: 100%; padding: 0.8rem; background: var(--secondary-bg);
            border: 1px solid #333; color: white; border-radius: 20px; padding-left: 1.5rem;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        .game-card {
            background-color: var(--secondary-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        .game-card:hover { transform: translateY(-5px); }
        .game-thumb {
            width: 100%; height: 180px; background-color: #333;
            display: flex; align-items: center; justify-content: center; color: #666;
        }
        .game-info { padding: 1.5rem; }
        .game-title { margin: 0 0 0.5rem 0; font-size: 1.25rem; }
        .game-desc { color: #a0a5c1; font-size: 0.9rem; margin-bottom: 1rem; }
        .play-btn {
            display: inline-block; background: var(--accent-color); color: white;
            padding: 0.5rem 1rem; text-decoration: none; border-radius: 4px; font-weight: bold;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Svilia Games</div>
        <ul>
            <li><a href="games.html" class="active">Games</a></li>
            <li><a href="news.html">News</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="main-content">
        <h1>Game Library</h1>
        <div class="search-bar">
            <input type="text" id="gameSearch" placeholder="Search games...">
        </div>

        <div class="games-grid" id="gamesGrid">
            <!-- Games dynamically rendered via JS -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
